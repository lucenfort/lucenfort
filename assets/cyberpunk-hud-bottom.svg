<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.08" />
    </pattern>
  </defs>

  <!-- Background Grid -->
  <rect width="1200" height="120" fill="url(#grid)" />

  <!-- Bottom Main Frame Bar (Mirrored) -->
  <polygon points="0,120 450,120 480,100 10,100 0,110" fill="#00F0FF" opacity="0.9" />
  <polygon points="10,95 470,95 490,80 20,80" fill="#FF003C" opacity="0.9" />
  <polygon points="15,75 200,75 210,65 20,65" fill="#FCE205" opacity="0.8" />
  
  <polygon points="1200,120 750,120 720,100 1190,100 1200,110" fill="#00F0FF" opacity="0.9" />
  <polygon points="1190,95 730,95 710,80 1180,80" fill="#FCE205" opacity="0.9" />
  <polygon points="1185,75 1000,75 990,65 1180,65" fill="#FF003C" opacity="0.8" />

  <!-- Central Element -->
  <path d="M490,100 L510,80 L690,80 L710,100 Z" fill="#0D1117" stroke="#FF003C" stroke-width="2" filter="url(#glowPink)"/>
  <text x="600" y="94" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#FFFFFF" font-weight="bold" letter-spacing="2">CONNECTION ESTABLISHED</text>

  <!-- Tech Texts -->
  <text x="30" y="114" font-family="'Courier New', monospace" font-size="11" fill="#0D1117" font-weight="bold">NET_PROTOCOL_V7</text>
  <text x="1170" y="114" font-family="'Courier New', monospace" font-size="11" fill="#0D1117" font-weight="bold" text-anchor="end">ENCRYPTION: AES-256-GCM</text>

  <!-- Loading Bar Section -->
  <g transform="translate(100, 20)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="12" fill="#00F0FF" font-weight="bold">MODEL_TRAINING_PROGRESS</text>
    <rect x="0" y="10" width="300" height="12" fill="#0D1117" stroke="#00F0FF" stroke-width="1.5" />
    <rect x="3" y="13" width="250" height="6" fill="#FF003C" filter="url(#glowPink)">
      <animate attributeName="width" values="0;294;294;0" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Data Flow Visualization -->
  <g transform="translate(800, 20)">
    <text x="300" y="0" font-family="'Courier New', monospace" font-size="12" fill="#FCE205" font-weight="bold" text-anchor="end">DATA_PIPELINE_THROUGHPUT</text>
    <rect x="0" y="10" width="300" height="12" fill="#0D1117" stroke="#FCE205" stroke-width="1.5" />
    <!-- Segmented progress -->
    <g fill="#00F0FF">
      <rect x="3" y="13" width="25" height="6" />
      <rect x="33" y="13" width="25" height="6" />
      <rect x="63" y="13" width="25" height="6" />
      <rect x="93" y="13" width="25" height="6" />
      <rect x="123" y="13" width="25" height="6" />
      <rect x="153" y="13" width="25" height="6" />
      <rect x="183" y="13" width="25" height="6" />
      <rect x="213" y="13" width="25" height="6" />
      <rect x="243" y="13" width="25" height="6">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
      </rect>
      <rect x="273" y="13" width="21" height="6">
        <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Circuit Traces -->
  <g fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.6">
    <path d="M 450,20 L 480,20 L 510,50 L 690,50 L 720,20 L 750,20" />
    <circle cx="450" cy="20" r="4" fill="#00F0FF" filter="url(#glow)"/>
    <circle cx="750" cy="20" r="4" fill="#00F0FF" filter="url(#glow)"/>
    <circle cx="600" cy="50" r="6" fill="#FF003C" filter="url(#glowPink)">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>