<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0080FF" />
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF003C" />
      <stop offset="100%" stop-color="#C2002E" />
    </linearGradient>
    <linearGradient id="neonYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCE205" />
      <stop offset="100%" stop-color="#FFB300" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.08" />
    </pattern>
  </defs>

  <!-- Background Grid -->
  <rect width="1200" height="150" fill="url(#grid)" />

  <!-- Top Main Frame Bar -->
  <!-- Left Side -->
  <polygon points="0,0 450,0 480,20 10,20 0,10" fill="#00F0FF" opacity="0.9" />
  <polygon points="10,25 470,25 490,40 20,40" fill="#FF003C" opacity="0.9" />
  <polygon points="15,45 200,45 210,55 20,55" fill="#FCE205" opacity="0.8" />
  
  <!-- Right Side -->
  <polygon points="1200,0 750,0 720,20 1190,20 1200,10" fill="#00F0FF" opacity="0.9" />
  <polygon points="1190,25 730,25 710,40 1180,40" fill="#FCE205" opacity="0.9" />
  <polygon points="1185,45 1000,45 990,55 1180,55" fill="#FF003C" opacity="0.8" />

  <!-- Center Frame -->
  <path d="M490,20 L510,40 L690,40 L710,20 Z" fill="#0D1117" stroke="#00F0FF" stroke-width="2" filter="url(#glowCyan)"/>

  <!-- Technical Texts on Frames -->
  <text x="30" y="14" font-family="'Courier New', monospace" font-size="11" fill="#0D1117" font-weight="bold">SYS.INIT // CORE_OVERRIDE_ENABLED</text>
  <text x="1170" y="14" font-family="'Courier New', monospace" font-size="11" fill="#0D1117" font-weight="bold" text-anchor="end">STATUS: OPTIMAL // UPLINK_ACTIVE</text>
  
  <text x="40" y="36" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" font-weight="bold">SEC_LEVEL_09</text>
  <text x="1160" y="36" font-family="'Courier New', monospace" font-size="11" fill="#0D1117" font-weight="bold" text-anchor="end">AUTH_VALID</text>

  <!-- Animated Data Stream (Bars) -->
  <g opacity="0.8">
    <rect x="50" y="70" width="6" height="15" fill="#00F0FF"><animate attributeName="height" values="5;20;5" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="62" y="70" width="6" height="25" fill="#00F0FF"><animate attributeName="height" values="25;10;25" dur="1.2s" repeatCount="indefinite"/></rect>
    <rect x="74" y="70" width="6" height="10" fill="#00F0FF"><animate attributeName="height" values="10;30;10" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="86" y="70" width="6" height="18" fill="#FF003C"><animate attributeName="height" values="18;5;18" dur="1.0s" repeatCount="indefinite"/></rect>
    <rect x="98" y="70" width="6" height="22" fill="#FCE205"><animate attributeName="height" values="8;22;8" dur="1.4s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Decorative Crosshairs and Targets -->
  <g stroke="#00F0FF" stroke-width="1.5" opacity="0.7">
    <circle cx="180" cy="100" r="25" fill="none" />
    <path d="M180 65 L180 135 M145 100 L215 100" />
    <circle cx="180" cy="100" r="12" fill="none" stroke="#FF003C" stroke-dasharray="3 5" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 180 100" to="360 180 100" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Hexadecimal Tech text -->
  <text x="240" y="85" font-family="'Courier New', monospace" font-size="13" fill="#00F0FF" opacity="0.8">0x7F2A_MEM</text>
  <text x="240" y="105" font-family="'Courier New', monospace" font-size="13" fill="#FF003C" opacity="0.8">0x8B3C_SYS</text>
  <text x="240" y="125" font-family="'Courier New', monospace" font-size="13" fill="#FCE205" opacity="0.8">0x9D4E_NET</text>

  <text x="960" y="85" font-family="'Courier New', monospace" font-size="13" fill="#00F0FF" opacity="0.8" text-anchor="end">SYS.MEM: 64TB</text>
  <text x="960" y="105" font-family="'Courier New', monospace" font-size="13" fill="#FF003C" opacity="0.8" text-anchor="end">GPU_UTIL: 99%</text>
  <text x="960" y="125" font-family="'Courier New', monospace" font-size="13" fill="#00F0FF" opacity="0.8" text-anchor="end">VRAM_ALLOC: 24GB</text>

  <!-- Right Decorative Element -->
  <g stroke="#FCE205" stroke-width="1.5" opacity="0.8">
    <polygon points="1040,80 1060,70 1080,80 1080,100 1060,110 1040,100" fill="none" filter="url(#glowPink)"/>
    <polygon points="1045,83 1057,77 1075,83 1075,97 1057,103 1045,97" fill="none" stroke="#00F0FF" stroke-dasharray="4 4" stroke-width="2">
       <animateTransform attributeName="transform" type="rotate" from="360 1060 90" to="0 1060 90" dur="8s" repeatCount="indefinite" />
    </polygon>
  </g>

  <!-- Subtitle (Centered) -->
  <text x="600" y="105" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#FF003C" font-weight="bold" letter-spacing="8" filter="url(#glowPink)">AI_ENGINEER // DATA_SCIENTIST</text>

  <!-- Title Bottom Line -->
  <path d="M380,120 L400,125 L800,125 L820,120" fill="none" stroke="#00F0FF" stroke-width="2" />
  <path d="M420,120 L780,120" fill="none" stroke="#FF003C" stroke-width="3" filter="url(#glowPink)"/>

  <!-- Scanning line overlay -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#00F0FF" stroke-width="2" opacity="0.3">
    <animate attributeName="y1" values="0;150;0" dur="5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;150;0" dur="5s" repeatCount="indefinite" />
  </line>
</svg>