<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#FF003C" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="100" fill="#0D1117" />
  <rect width="400" height="100" fill="url(#grid)" />
  
  <polygon points="0,0 20,0 30,10 30,100 0,100" fill="#FF003C" opacity="0.8" />
  <polygon points="400,100 380,100 370,90 370,0 400,0" fill="#FCE205" opacity="0.8" />
  
  <rect x="15" y="15" width="370" height="70" fill="none" stroke="#FF003C" stroke-width="1" opacity="0.3" />
  
  <g fill="none" stroke="#FCE205" stroke-width="3" filter="url(#glowYellow)" transform="translate(45, 30)">
    <polyline points="0,35 12,20 24,28 38,5" />
    <circle cx="0" cy="35" r="3" fill="#FF003C" stroke="none" />
    <circle cx="12" cy="20" r="3" fill="#FF003C" stroke="none" />
    <circle cx="24" cy="28" r="3" fill="#FF003C" stroke="none" />
    <circle cx="38" cy="5" r="3" fill="#FF003C" stroke="none" />
  </g>

  <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="1">E-COMMERCE_ANALYTICS</text>
  <text x="100" y="65" font-family="'Courier New', monospace" font-size="10" fill="#FF003C">BIG DATA // SQL // INSIGHTS</text>
</svg>
