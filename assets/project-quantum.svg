<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes scan {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100px); }
    }
    @keyframes flicker {
      0% { opacity: 0.8; }
      5% { opacity: 0.4; }
      10% { opacity: 0.8; }
      15% { opacity: 1; }
      80% { opacity: 1; }
      85% { opacity: 0.2; }
      90% { opacity: 0.8; }
      100% { opacity: 1; }
    }
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.6; }
      100% { opacity: 0.3; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 10; }
      100% { stroke-dashoffset: 0; }
    }
    .flicker { animation: flicker 3s infinite; }
    .scan-line { animation: scan 4s linear infinite; opacity: 0.2; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .spin { animation: spin 4s linear infinite; transform-origin: center; }
    .dash { animation: dash 1s linear infinite; }
  </style>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="100" fill="#0D1117" />
  <rect width="400" height="100" fill="url(#grid)" />
  
  <rect width="400" height="2" fill="#00F0FF" class="scan-line" />
  
  <polygon points="0,0 20,0 30,10 30,100 0,100" fill="#00F0FF" opacity="0.8" class="flicker" />
  <polygon points="400,100 380,100 370,90 370,0 400,0" fill="#FF003C" opacity="0.8" class="flicker" />
  
  <rect x="15" y="15" width="370" height="70" fill="none" stroke="#00F0FF" stroke-width="1" class="pulse" />
  <polygon points="15,15 30,15 30,2 15,2" fill="#00F0FF" />
  
  <g transform="translate(40, 30)">
    <circle cx="10" cy="20" r="6" stroke="#00F0FF" stroke-width="2" fill="none" filter="url(#glowCyan)" class="pulse" />
    <circle cx="40" cy="20" r="6" stroke="#FF003C" stroke-width="2" fill="none" filter="url(#glowPink)" class="pulse" />
    <path d="M 16 20 Q 25 10 34 20" stroke="#FCE205" stroke-width="1" fill="none" stroke-dasharray="2,2" class="dash" />
    <path d="M 16 20 Q 25 30 34 20" stroke="#FCE205" stroke-width="1" fill="none" stroke-dasharray="2,2" class="dash" />
  </g>

  <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="1" class="flicker">QUANTUM_TELEPORT</text>
  <text x="100" y="65" font-family="'Courier New', monospace" font-size="10" fill="#00F0FF">COMPUTAÇÃO QUÂNTICA // QISKIT</text>
</svg>
