<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="100" fill="#0D1117" />
  <rect width="400" height="100" fill="url(#grid)" />
  
  <polygon points="0,0 20,0 30,10 30,100 0,100" fill="#00F0FF" opacity="0.8" />
  <polygon points="400,100 380,100 370,90 370,0 400,0" fill="#FF003C" opacity="0.8" />
  
  <rect x="15" y="15" width="370" height="70" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3" />
  <polygon points="15,15 30,15 30,2 15,2" fill="#00F0FF" />
  
  <!-- Quantum Icon: Entangled Qubits -->
  <g transform="translate(40, 30)">
    <circle cx="10" cy="20" r="6" stroke="#00F0FF" stroke-width="2" fill="none" filter="url(#glowCyan)" />
    <circle cx="40" cy="20" r="6" stroke="#FF003C" stroke-width="2" fill="none" filter="url(#glowPink)" />
    <path d="M 16 20 Q 25 10 34 20" stroke="#FCE205" stroke-width="2" fill="none" stroke-dasharray="2,2" />
    <path d="M 16 20 Q 25 30 34 20" stroke="#FCE205" stroke-width="2" fill="none" stroke-dasharray="2,2" />
  </g>

  <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="1">QUANTUM_TELEPORT</text>
  <text x="100" y="65" font-family="'Courier New', monospace" font-size="10" fill="#00F0FF">COMPUTAÇÃO QUÂNTICA // QISKIT</text>
</svg>
