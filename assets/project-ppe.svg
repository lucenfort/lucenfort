<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="100" fill="#0D1117" />
  <rect width="400" height="100" fill="url(#grid)" />
  
  <polygon points="0,0 20,0 30,10 30,100 0,100" fill="#00F0FF" opacity="0.8" />
  <polygon points="400,100 380,100 370,90 370,0 400,0" fill="#FF003C" opacity="0.8" />
  
  <rect x="15" y="15" width="370" height="70" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3" />
  <polygon points="15,15 30,15 30,2 15,2" fill="#00F0FF" />
  
  <g stroke="#FCE205" stroke-width="2" fill="none" transform="translate(40, 30)">
    <polyline points="10,0 0,0 0,10" />
    <polyline points="30,0 40,0 40,10" />
    <polyline points="10,40 0,40 0,30" />
    <polyline points="30,40 40,40 40,30" />
    <rect x="8" y="8" width="24" height="24" stroke="#FF003C" filter="url(#glowPink)" />
  </g>

  <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="1">PPE_DETECTION</text>
  <text x="100" y="65" font-family="'Courier New', monospace" font-size="10" fill="#00F0FF">VISÃO COMPUTACIONAL // YOLO</text>
</svg>
