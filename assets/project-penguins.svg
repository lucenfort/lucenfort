<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#9F00FF" stroke-width="0.5" stroke-opacity="0.15" />
    </pattern>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="100" fill="#0D1117" />
  <rect width="400" height="100" fill="url(#grid)" />
  
  <polygon points="0,0 20,0 30,10 30,100 0,100" fill="#9F00FF" opacity="0.8" />
  <polygon points="400,100 380,100 370,90 370,0 400,0" fill="#00F0FF" opacity="0.8" />
  
  <rect x="15" y="15" width="370" height="70" fill="none" stroke="#9F00FF" stroke-width="1" opacity="0.3" />
  
  <!-- Bar Chart / Histogram Icon -->
  <g fill="none" stroke="#00F0FF" stroke-width="3" filter="url(#glowCyan)" transform="translate(45, 30)">
    <line x1="0" y1="40" x2="40" y2="40" stroke="#9F00FF" />
    <line x1="0" y1="0" x2="0" y2="40" stroke="#9F00FF" />
    <rect x="5" y="25" width="8" height="15" fill="#00F0FF" stroke="none" />
    <rect x="15" y="15" width="8" height="25" fill="#00F0FF" stroke="none" />
    <rect x="25" y="5" width="8" height="35" fill="#00F0FF" stroke="none" />
  </g>

  <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" letter-spacing="1">PALMER_PENGUINS_EDA</text>
  <text x="100" y="65" font-family="'Courier New', monospace" font-size="10" fill="#9F00FF">ANALISE EXPLORATÓRIA // DADOS</text>
</svg>
